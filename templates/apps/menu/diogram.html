{% extends 'apps/base/base.html' %}

{% block body %}
	<h2>O‘zbekiston Viloyatlari Aholisi</h2>
    <canvas id="populationChart"></canvas>

    <script>
        const ctx = document.getElementById('populationChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ["Toshkent", "Samarqand", "Farg‘ona", "Andijon", "Namangan",
                         "Buxoro", "Xorazm", "Qashqadaryo", "Surxondaryo", "Jizzax",
                         "Sirdaryo", "Navoiy", "Qoraqalpog‘iston"],
                datasets: [{
                    data: [3000000, 4000000, 3800000, 3200000, 2900000, 1900000, 1800000,
                           3400000, 2600000, 1400000, 900000, 900000, 2000000],
                    backgroundColor: ["#66b3ff", "#ff9999", "#99ff99", "#ffcc99", "#c2c2f0",
                                      "#ffb3e6", "#c2f0c2", "#ff6666", "#b3b3cc", "#ffcc66",
                                      "#c2c266", "#80b3ff", "#ff80b3"],
                    borderColor: "#ffffff",
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    tooltip: {
                        enabled: true
                    }
                }
            }
        });
    </script>
{% endblock %}
